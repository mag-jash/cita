<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<h2>Iniciar Sesión</h2>

<form onsubmit="login(event)">

<input type="email" id="correo" placeholder="Correo" required><br><br>

<input type="password" id="password" placeholder="Contraseña" required><br><br>

<button type="submit">Entrar</button>

</form>

<p>¿No tienes cuenta?  
<a href="registro.html">Registrarse</a></p>

<script>

function login(e){
e.preventDefault()

let correo=document.getElementById("correo").value
let password=document.getElementById("password").value

let usuario = JSON.parse(localStorage.getItem(correo))

if(usuario && usuario.password === password){

localStorage.setItem("sesion",usuario.nombre)

window.location="citas.html"

}else{

alert("Datos incorrectos")

}

}

</script>

</body>
</html>
