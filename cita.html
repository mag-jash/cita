<!DOCTYPE html>
<html>
<head>
<title>Agendar Cita</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Agendar Cita con Psicólogo</h1>

<div class="formulario">

<label>Nombre</label>
<input type="text" placeholder="Tu nombre">

<label>Correo</label>
<input type="email" placeholder="Tu correo">

<label>Fecha</label>
<input type="date">

<label>Hora</label>
<input type="time">

<label>Motivo de la consulta</label>
<textarea placeholder="Describe brevemente"></textarea>

<button onclick="cita()">Agendar</button>

</div>

<script src="script.js"></script>

</body>
</html>
