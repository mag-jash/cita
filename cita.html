<div class="formulario">

<input type="text" placeholder="Tu nombre">

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agendar Cita</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="titulo">Agendar Cita con Psicólogo</h1>

<div class="formulario">
<form id="formCita">

<input type="text" id="nombre" placeholder="Nombre del paciente" required>

<input type="text" id="psicologo" placeholder="Nombre del psicólogo" required>

<input type="date" id="fecha" required>

<textarea id="motivo" placeholder="Motivo de la cita"></textarea>

<button type="submit">Registrar Cita</button>

</form>
</div>

<script src="script.js"></script>

</body>

</body>
