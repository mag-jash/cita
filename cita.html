<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agendar Cita</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="titulo">Agendar Cita con Psicólogo</h1>

<div class="formulario">

<form id="formCita">

<label>Nombre del paciente</label>
<input type="text" id="nombre" placeholder="Tu nombre" required>

<label>Correo</label>
<input type="email" id="correo" placeholder="Tu correo" required>

<label>Psicólogo</label>
<input type="text" id="psicologo" placeholder="Nombre del psicólogo" required>

<label>Fecha</label>
<input type="date" id="fecha" required>

<label>Hora</label>
<input type="time" id="hora" required>

<label>Motivo de la consulta</label>
<textarea id="motivo" placeholder="Describe brevemente"></textarea>

<button type="submit">Agendar Cita</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
