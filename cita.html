
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agendar Cita</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

.formulario{
background:white;
width:350px;
margin:auto;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:10px;
width:100%;
border:none;
margin-top:10px;
}

.agendar{
background:#2196F3;
color:white;
}

.cerrar{
background:#f44336;
color:white;
}

</style>
</head>

<body>

<h1 id="bienvenida"></h1>

<button class="cerrar" onclick="cerrarSesion()">Cerrar sesión</button>

<br><br>

<div class="formulario">

<h3>Agendar cita con psicólogo</h3>

<form onsubmit="registrarCita(event)">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="email" id="correo" placeholder="Correo" required>

<input type="date" id="fecha" required>

<input type="time" id="hora" required>

<button class="agendar" type="submit">Agendar Cita</button>

</form>

</div>

<script>

let nombreSesion = localStorage.getItem("sesion")

if(!nombreSesion){
window.location="login.html"
}

document.getElementById("bienvenida").innerHTML =
"Bienvenido " + nombreSesion


function registrarCita(e){

e.preventDefault()

let nombre=document.getElementById("nombre").value
let correo=document.getElementById("correo").value
let fecha=document.getElementById("fecha").value
let hora=document.getElementById("hora").value


let cita = {
nombre:nombre,
correo:correo,
fecha:fecha,
hora:hora
}

let citas = JSON.parse(localStorage.getItem("citas")) || []

citas.push(cita)

localStorage.setItem("citas", JSON.stringify(citas))

alert("Cita registrada correctamente")

document.querySelector("form").reset()

}


function cerrarSesion(){

localStorage.removeItem("sesion")

window.location="login.html"

}

</script>

</body>
</html>
